# Deploy de un solo comando:  docker compose up --build -d
services:
  bridge:
    build: .
    image: happyrobot-bridge:latest
    container_name: happyrobot-bridge
    env_file: .env          # secretos fuera de la imagen (gitignored)
    ports:
      - "8000:8000"
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request,sys; sys.exit(0 if urllib.request.urlopen('http://127.0.0.1:8000/health').status==200 else 1)"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
